name: examples-and-templates

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go run ./cmd/kiro check examples/hello
      - run: go run ./cmd/kiro check examples/http_hello
      - run: go run ./cmd/kiro check examples/http_json
      - run: go run ./cmd/kiro check examples/service_health
      - run: go run ./cmd/kiro check examples/spawn_await
      - run: go run ./cmd/kiro fmt examples/hello examples/http_hello examples/http_json examples/service_health examples/spawn_await
      - run: go run ./cmd/kiro inspect go examples/hello --out-dir .kiro-gen-example
      - run: go run ./cmd/kiro build examples/hello --out ./hello-example
      - run: ./hello-example
      - run: go run ./cmd/kiro test examples/test_demo

  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go build -o ./kiro ./cmd/kiro
      - run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          $GITHUB_WORKSPACE/kiro new hello
          $GITHUB_WORKSPACE/kiro check hello
          $GITHUB_WORKSPACE/kiro fmt hello
          $GITHUB_WORKSPACE/kiro inspect go hello --out-dir .kiro-gen-hello
          $GITHUB_WORKSPACE/kiro build hello --out ./hello-bin
          ./hello-bin
          hello_run_output="$($GITHUB_WORKSPACE/kiro run hello)"
          printf '%s\n' "$hello_run_output"
          printf '%s' "$hello_run_output" | grep "hello"
      - run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          $GITHUB_WORKSPACE/kiro new service
          $GITHUB_WORKSPACE/kiro check service
          $GITHUB_WORKSPACE/kiro fmt service
          $GITHUB_WORKSPACE/kiro test service
          $GITHUB_WORKSPACE/kiro inspect go service --out-dir .kiro-gen-service
          $GITHUB_WORKSPACE/kiro build service --out ./service-bin
          PORT=":18084" ./service-bin >service-bin.log 2>service-bin.err &
          service_pid=$!
          cleanup() {
            kill "$service_pid" >/dev/null 2>&1 || true
            wait "$service_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          python3 - <<'PY'
          import sys, time, urllib.request
          url = 'http://127.0.0.1:18084/health'
          for _ in range(30):
              try:
                  body = urllib.request.urlopen(url, timeout=1).read().decode()
                  if body.strip() == 'ok':
                      print('service build smoke check ok')
                      sys.exit(0)
              except Exception:
                  time.sleep(0.5)
          print('service build smoke check failed', file=sys.stderr)
          sys.exit(1)
          PY
          cleanup
          trap - EXIT
          PORT=":18085" $GITHUB_WORKSPACE/kiro run service >service-run.log 2>service-run.err &
          service_pid=$!
          trap cleanup EXIT
          python3 - <<'PY'
          import sys, time, urllib.request
          url = 'http://127.0.0.1:18085/health'
          for _ in range(30):
              try:
                  body = urllib.request.urlopen(url, timeout=1).read().decode()
                  if body.strip() == 'ok':
                      print('service run smoke check ok')
                      sys.exit(0)
              except Exception:
                  time.sleep(0.5)
          print('service run smoke check failed', file=sys.stderr)
          sys.exit(1)
          PY
