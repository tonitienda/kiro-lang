name: release-toolchain

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: '1.22.12'

permissions:
  contents: write

jobs:
  package-bundles:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.12'
          cache: false
      - name: Compute release label
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "RELEASE_LABEL=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_LABEL=dev-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi
      - run: ./scripts/package_release.sh "${RELEASE_LABEL}" "${GO_VERSION}" "${{ matrix.goos }}" "${{ matrix.goarch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: kiro-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/kiro-${{ env.RELEASE_LABEL }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/kiro-${{ env.RELEASE_LABEL }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  standalone-verify:
    runs-on: ubuntu-latest
    needs: package-bundles
    steps:
      - uses: actions/checkout@v4
      - name: Compute release label
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "RELEASE_LABEL=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_LABEL=dev-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi
      - uses: actions/download-artifact@v4
        with:
          name: kiro-linux-amd64
          path: dist
      - run: ./scripts/verify_release_bundle.sh dist/kiro-${RELEASE_LABEL}-linux-amd64.tar.gz
